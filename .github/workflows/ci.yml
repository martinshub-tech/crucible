name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  check:
    name: cargo check (stable)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo check --workspace --exclude backend

  msrv:
    name: cargo check (MSRV)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@1.91.0
      - run: cargo check --workspace --exclude backend

  test:
    name: cargo test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test --workspace --exclude backend
