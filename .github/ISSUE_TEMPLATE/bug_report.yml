name: Bug Report
description: Report a bug to help us improve crucible
title: "[Bug] "
labels: ["type:bug", "needs-discussion"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report. Please provide as much detail as possible.
  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which part of the project is affected?
      options:
        - area:core-api
        - area:backend
        - area:build
        - area:examples
        - area:docs
        - area:testing
        - area:security
        - area:ci
        - area:fixtures
        - area:tokens
        - area:performance
    validations:
      required: true
  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - priority:P1
        - priority:P2
        - priority:P3
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this bug?
      placeholder: |
        1. Run `cargo test -p crucible`
        2. See error...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Rust version, OS, SDK version
      placeholder: |
        rustc 1.85.0
        soroban-sdk 26.1.0
        Ubuntu 24.04
    validations:
      required: false
