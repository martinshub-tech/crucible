name: Feature Request
description: Suggest an enhancement or new feature for crucible
title: "[Feature] "
labels: ["needs-discussion"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature! Please describe what you'd like to see added.
  - type: dropdown
    id: type
    attributes:
      label: Request Type
      options:
        - type:feature (Net-new capability)
        - type:enhancement (Improvement to existing functionality)
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - area:core-api
        - area:backend
        - area:build
        - area:examples
        - area:docs
        - area:testing
        - area:security
        - area:ci
        - area:fixtures
        - area:tokens
        - area:performance
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this feature solve?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the API or behavior you'd like to see
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: What workarounds or alternative approaches have you considered?
    validations:
      required: false
